<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobaara — Wear It Again</title>
    <link rel="stylesheet" href="Shop.css">
</head>

<body>
    <header>
        <div class="head">
            <span class="Dobaara">Dobaara</span>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="Shop.html">Shop</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Sell</a></li>
            </ul>
            <div class="button">
                <div style="display: inline;font-size: larger;padding-right: 15px;cursor: pointer;">🛒<span
                        class="cart-badge">0</span></div>
                <button class="login">Login</button>
                <button class="signup">Sign Up</button>
            </div>
        </div>
    </header>
    <section style="position: relative;top: 71px;">




        <div style="background-color: #EDE0CC;padding: 40px 80px 32px;">
            <h1 style="font-family:'Playfair Display', serif;font-size: 3.5vw;line-height: 1.2;">
                Browse <em style="color: #c0634a; font-style: italic;">all clothes</em>
            </h1>
            <p style="color:#7A6252;margin-top: 8px;">Handpicked pieces, new drops every week.</p>
        </div>
        <div class="shop-layout" style="display: grid; grid-template-columns: 1fr 3fr; padding: 50px;">
            <div class="filter-panel">
                <div class="filter" style="font-size: 16px;font-weight: 500;margin-bottom: 20px;">Filters</div>
                <div class="filter-grp">
                    <div class="filter-grp-title">Category</div>
                    <div class="filter-chips">
                    <div class="chip">All</div>
                    <div class="chip">Tops</div>
                    <div class="chip">Dresses</div>
                    <div class="chip">Jackets</div>
                    <div class="chip">Bottoms</div>
                    <div class="chip">Accessories</div>
                    </div>
                </div>
                <div class="filter-grp" style="margin-top: 15px;">
                    <div class="filter-grp-title">Size</div>
                    <div class="filter-chips">
                        <div class="chip">XS</div>
                        <div class="chip">S</div>
                        <div class="chip">M</div>
                        <div class="chip">L</div>
                        <div class="chip">XL</div>
                        <div class="chip">XXL</div>
                    </div>
                </div>
                <div class="filter-grp" style="margin-top: 15px;">
                    <div class="filter-grp-title">Condition</div>
                    <div class="filter-chips">
                        <div class="chip">Like new</div>
                        <div class="chip">Good</div>
                        <div class="chip">Fair</div>
                    </div>
                </div>
                <div class="filter-grp" style="margin-top: 15px;">
                    <div class="filter-grp-title">Price range (₹)</div>
                    <div class="price-range">
                        <input type="number" class="price-input" placeholder="Min">
                        <input type="number" class="price-input" placeholder="Max"> 
                    </div>
                </div>
                <button class="button-change">Apply Filters</button>
            </div>
            <div class="shop-main"></div>
        </div>



    </section>
</body>

</html>
